<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumænaut_ — Redirecting</title>
  <link rel="canonical" href="https://lumaenaut.com/eng-US/">
  <script>
    (function () {
      var lang = navigator.language || navigator.userLanguage || "";
      var preferred = (navigator.languages && navigator.languages[0]) || lang;
      var useSpanish = /^es\b/i.test(preferred) || /^es\b/i.test(lang);
      window.location.replace(useSpanish ? "/esp-LAT/" : "/eng-US/");
    })();
  </script>
  <meta http-equiv="refresh" content="1; url=/eng-US/">
</head>
<body>
  <p>Redirecting… <a href="/eng-US/">English</a> · <a href="/esp-LAT/">Español</a></p>
</body>
</html>
